<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AflaLearn — Understand Aflatoxin</title>
<meta name="description" content="A free, plain-language course on aflatoxin: what it is, why it matters, and what prevention efforts like FS4Africa are doing about it.">
<link rel="icon" href="aflalearnlogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button class="brand" data-nav="#/">
      <img src="aflalearnlogo.png" alt="AflaLearn logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="brand-text-fallback" style="display:none;">A</div>
      <div class="brand-name">
        <span class="b1">AflaLearn</span>
        <span class="b2">understand aflatoxin</span>
      </div>
    </button>
    <nav class="desktop-nav" id="desktopNav">
      <button class="navlink" data-view="home">Topics</button>
      <button class="navlink" data-view="settings">Settings</button>
    </nav>
    <div class="topbar-actions">
      <div class="user-chip" id="userChip" style="display:none;">
        <span class="avatar"></span>
        <span class="chip-name"></span>
      </div>
      <button class="icon-btn" id="themeToggle" title="Switch light/dark mode"><span class="emoji" id="themeIcon">☽</span></button>
      <button class="icon-btn hamburger" id="hamburgerBtn" title="Menu"><span class="emoji">☰</span></button>
    </div>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <button class="navlink" data-view="home">Topics</button>
    <button class="navlink" data-view="settings">Settings</button>
    <button class="navlink" id="mobileLogoutBtn">Logout</button>
  </div>
</header>

<main>
  <div id="app"></div>
</main>

<div class="login-shell" id="loginShell" style="display:none;"></div>

<footer>
  AflaLearn, a plain-language course on aflatoxin. Progress is stored only on this device. Not affiliated with FS4Africa, IITA or PACA.
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
